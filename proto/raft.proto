syntax = "proto3";

package raft;

option go_package = "github.com/ani03sha/raftly/proto;raftpb";


// Defines the three RPCs node exchange
service RaftService {
  rpc RequestVote(VoteRequest) returns (VoteResponse);
  rpc PreVote(VoteRequest) returns (VoteResponse);
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);
}


// VoteRequest is used for both PreVote and RequestVote. The pre_vote field distinguishes them
message VoteRequest {
  uint64 term = 1;
  string candidate_id = 2;
  uint64 last_log_index = 3;
  uint64 last_log_term = 4;
  bool pre_vote = 5;
}

message VoteResponse {
  uint64 term = 1;
  bool vote_granted = 2;
}

message LogEntry {
  uint64 index = 1;
  uint64 term = 2;
  bytes data = 3;
  int32 type = 4;
}

message AppendEntriesRequest {
  uint64 term = 1;
  string leader_id = 2;
  uint64 prev_log_index = 3;
  uint64 prev_log_term = 4;
  repeated LogEntry entries = 5;
  uint64 leader_commit = 6;
}

message AppendEntriesResponse {
  uint64 term = 1;
  bool success = 2;
  uint64 conflict_term = 3;
  uint64 conflict_index = 4;
}